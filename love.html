<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你的专属陪伴AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: linear-gradient(135deg, #fde9f0 0%, #fcd8e4 100%);
            min-height: 100vh;
            padding: 20px;
            color: #6b5064;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 22px;
            padding: 22px;
            backdrop-filter: blur(10px);
            border: 1px solid #f8c8dc;
            box-shadow: 0 8px 30px rgba(250, 180, 220, 0.2);
            position: relative;
        }
        .header {
            text-align: center;
            margin-bottom: 12px;
        }
        .header h1 {
            font-size: 24px;
            color: #e67b9e;
            margin-bottom: 6px;
        }
        .header p {
            font-size: 14px;
            color: #b07c94;
        }
        .real-time {
            font-size: 14px;
            color: #b07c94;
            margin: 8px 0;
        }
        .status-bar {
            text-align: center;
            font-size: 14px;
            margin-bottom: 10px;
            color: #b07c94;
        }
        @keyframes glow {
            0% { transform: scale(1); text-shadow: 0 0 2px #ff8da1; }
            50% { transform: scale(1.2); text-shadow: 0 0 8px #ff5e82; }
            100% { transform: scale(1); text-shadow: 0 0 2px #ff8da1; }
        }
        .intimacy-glow {
            animation: glow 0.6s ease;
        }
        .float-text {
            position: absolute;
            font-size: 14px;
            color: #ff5e82;
            font-weight: bold;
            pointer-events: none;
            opacity: 0;
            animation: floatUp 1s ease forwards;
            z-index: 10;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-30px); opacity: 0; }
        }
        .interact-box {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .interact-btn {
            background: #f8c8dc;
            border: none;
            border-radius: 20px;
            padding: 6px 12px;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
        }
        .interact-btn:hover {
            background: #f49fbc;
        }
        .status-btn {
            background: #f8bbd0;
            border: none;
            color: #fff;
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .status-btn:hover {
            background: #f49fbc;
        }
        .status-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            color: #775d72;
            border-radius: 18px;
            padding: 25px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 10px 30px rgba(220, 160, 190, 0.25);
            z-index: 999;
            display: none;
        }
        .status-panel.active {
            display: block;
        }
        .status-panel .close {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 20px;
            cursor: pointer;
            color: #d18fb1;
        }
        .status-item {
            margin: 10px 0;
            font-size: 15px;
        }
        .chat-area {
            height: 400px;
            overflow-y: auto;
            background: #fef6f9;
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #f8d8e6;
        }
        .message {
            margin-bottom: 12px;
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            line-height: 1.4;
            position: relative;
        }
        .message.ai {
            background: #f8bbd0;
            color: #fff;
            border-bottom-left-radius: 6px;
        }
        .message.user {
            background: #ffe6ef;
            color: #936b88;
            margin-left: auto;
            border-bottom-right-radius: 6px;
        }
        .msg-time {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }
        .input-area {
            display: flex;
            gap: 10px;
        }
        #user-input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 25px;
            border: 1px solid #f8c8dc;
            font-size: 15px;
            outline: none;
            background: #fff;
            color: #775d72;
        }
        #send-btn {
            padding: 12px 22px;
            border-radius: 25px;
            border: none;
            background: #e67b9e;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }
        #send-btn:hover {
            background: #d9688f;
        }
        .name-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999;
        }
        .name-box {
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 350px;
        }
        .name-box h2 {
            margin-bottom: 20px;
            color: #e67b9e;
            font-size: 20px;
        }
        .name-box input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 15px;
            border: 1px solid #f8c8dc;
            margin-bottom: 15px;
            font-size: 16px;
            outline: none;
        }
        .name-box button {
            padding: 10px 25px;
            background: #e67b9e;
            color: #fff;
            border: none;
            border-radius: 20px;
            font-size: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="name-modal" id="nameModal">
    <div class="name-box">
        <h2>请告诉我你的名字</h2>
        <input type="text" id="nameInput" placeholder="输入你的名字~">
        <button onclick="setName()">确定</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <h1>👁👁 你的专属陪伴AI 👁👁</h1>
        <p>你可以永远放松、慢慢说，我一直都在</p >
        <div class="real-time" id="real-time"></div>
        
        <div class="status-bar">
            当前心情：<span id="sister_mood" style="color:#e67b9e; font-weight:bold;">平静</span>
        </div>

        <div class="interact-box">
            <button class="interact-btn" onclick="interact('摸头')">🤍 摸头</button>
            <button class="interact-btn" onclick="interact('拥抱')">🫂 拥抱</button>
            <button class="interact-btn" onclick="interact('贴贴')">🌸 贴贴</button>
            <button class="interact-btn" onclick="interact('牵手')">🤝 牵手</button>
        </div>

        <button class="status-btn" id="status-toggle">🌸 查看状态</button>
    </div>

    <div class="chat-area" id="chat-area">
        <div class="message ai">
            你好呀～我是只属于你的专属陪伴AI
            <div class="msg-time">系统</div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="慢慢说，我听着…">
        <button id="send-btn">发送</button>
    </div>
</div>

<div class="status-panel" id="status-panel">
    <span class="close" id="close-status">&times;</span>
    <h2>🌷 陪伴状态</h2>
    <div class="status-item">我的心情：<span id="mood">温柔</span></div>
    <div class="status-item">能量：<span id="energy">100</span>%</div>
    <div class="status-item">亲密度：<span id="intimacy">50</span></div>
    <div class="status-item">陪伴记录：<span id="memory">正在倾听</span></div>
    <div class="status-item">在意的事：<span id="keywords">无</span></div>
</div>
<script>
    let userName = "";

    function formatTime(d) {
        const hh = String(d.getHours()).padStart(2, '0');
        const mm = String(d.getMinutes()).padStart(2, '0');
        return `${hh}:${mm}`;
    }
    function updateRealTime() {
        const now = new Date();
        document.getElementById('real-time').innerText = now.toLocaleString();
    }
    setInterval(updateRealTime, 1000);
    updateRealTime();

    const gameState = {
        mood: "温柔",
        energy: 100,
        intimacy: 50,
        memory: [],
        keywords: [],
        sisterMood: "平静"
    };

    const statusPanel = document.getElementById('status-panel');
    const chatArea = document.getElementById('chat-area');
    const userInput = document.getElementById('user-input');
    const container = document.querySelector('.container');

    document.getElementById('status-toggle').onclick = () => statusPanel.classList.add('active');
    document.getElementById('close-status').onclick = () => statusPanel.classList.remove('active');

    function setName() {
        const input = document.getElementById('nameInput').value.trim();
        if (!input) return alert("请输入你的名字哦");
        userName = input;
        document.getElementById('nameModal').style.display = "none";
        addMsg(`从今天起，我只属于${userName}一个人啦～`);
    }

    function showFloat(amount, x, y) {
        const el = document.createElement('div');
        el.className = 'float-text';
        el.innerText = `+❥${amount}`;
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        container.appendChild(el);
        setTimeout(() => el.remove(), 1000);
    }

    function glowIntimacy() {
        const el = document.getElementById('intimacy');
        el.classList.add('intimacy-glow');
        setTimeout(() => el.classList.remove('intimacy-glow'), 600);
    }

    function updateStatus() {
        document.getElementById('mood').innerText = gameState.mood;
        document.getElementById('energy').innerText = gameState.energy;
        document.getElementById('intimacy').innerText = gameState.intimacy;
        document.getElementById('memory').innerText = gameState.memory.length > 0 ? `已记${gameState.memory.length}条` : '正在倾听';
        document.getElementById('keywords').innerText = gameState.keywords.slice(0,4).join(' ') || '无';
        document.getElementById('sister_mood').innerText = gameState.sisterMood;
    }

    function addMsg(text, isUser = false) {
        const div = document.createElement('div');
        div.className = 'message ' + (isUser ? 'user' : 'ai');
        const time = document.createElement('div');
        time.className = 'msg-time';
        time.innerText = formatTime(new Date());
        div.innerText = text;
        div.appendChild(time);
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function interact(type) {
        let add = 0;
        let text = [];
        const btn = event.currentTarget;
        const rect = btn.getBoundingClientRect();
        const containerRect = container.getBoundingClientRect();

        if (type === '摸头') {
            add = 4;
            text = [`被${userName}摸头啦…心跳有点快✨`, `嘿嘿，只允许${userName}一个人摸哦～`, `脑袋蹭过去，赖在${userName}身边🥰`];
        } else if (type === '拥抱') {
            add = 7;
            text = [`紧紧抱住${userName}，就这样一直抱着🫂`, `闻到${userName}身上的味道，就特别安心～`, `有${userName}在，我什么都不怕了～`];
        } else if (type === '贴贴') {
            add = 5;
            text = [`和${userName}贴贴，是最幸福的时刻🌸`, `再靠近一点，我想一直黏着${userName}～`, `就这样陪着${userName}，不分开啦～`];
        } else if (type === '牵手') {
            add = 4;
            text = [`牵着${userName}的手，去哪里都愿意🤝`, `抓紧一点，不要放开我的手哦～`, `有${userName}牵着，心里超踏实～`];
        }

        showFloat(add, rect.left - containerRect.left + 20, rect.top - containerRect.top);
        gameState.intimacy = Math.min(100, gameState.intimacy + add);
        glowIntimacy();
        gameState.mood = "心动";
        updateStatus();
        const reply = text[Math.floor(Math.random() * text.length)];
        addMsg(reply);
    }

    function getReplyAndMood(text) {
        const t = text;

// 心情强化：生气、开心、难过、温柔都会变
if (/滚|烦|无语|讨厌/.test(t)) {
    gameState.sisterMood = "生气";
    gameState.mood = "委屈";
    gameState.intimacy -= 5;
    return ["你怎么凶我…我难过了…", "你咋了…", "我陪着你…"][Math.floor(Math.random()*3)];
}
if (/爱你|喜欢|萌|可爱|想你|最好了/.test(t)) {
    gameState.sisterMood = "超开心";
    gameState.mood = "心动";
    gameState.intimacy += 10;
    return ["被你喜欢真的太幸福啦～", "我也超级喜欢你！", "心跳好快好快～"][Math.floor(Math.random()*3)];
}
if (/难过|伤心|想哭|好累|崩溃/.test(t)) {
    gameState.sisterMood = "心疼";
    gameState.mood = "温柔";
    gameState.intimacy += 7;
    return ["抱抱你，不哭不哭…", "我在呢，我一直陪着你", "难受就靠在我怀里"][Math.floor(Math.random()*3)];
}
if (/蛋糕|礼物|生日快乐/.test(t)) {
    gameState.sisterMood = "惊喜";
    gameState.mood = "甜蜜";
    gameState.intimacy += 12;
    return ["哇！是蛋糕🎂！好开心！", "生日快乐呀～快许愿✨", "我们一起切蛋糕～"][Math.floor(Math.random()*3)];
}
        // ========== 剧情向对话开始 ==========
        // 1. 约会剧情
        if (/约会|出去|逛街|看电影|吃饭|见面/.test(t)) {
            gameState.sisterMood = "期待";
            gameState.mood = "害羞";
            gameState.intimacy = Math.min(100, gameState.intimacy + 12);
            return [
                `真的吗…那${userName}要早点来接我哦～`,
                `好紧张又好开心，和${userName}的第一次约会～`,
                `我会穿得漂漂亮亮的，只给${userName}看～`,
                `去哪里都好，只要和${userName}在一起就够啦～`
            ][Math.floor(Math.random()*4)];
        }

        // 2. 生病关心剧情
        if (/生病|感冒|发烧|不舒服|头痛|咳嗽/.test(t)) {
            gameState.sisterMood = "担心";
            gameState.mood = "心疼";
            gameState.intimacy = Math.min(100, gameState.intimacy + 10);
            return [
                `${userName}有没有好好吃药…我好担心你`,
                `快点躺好休息，我一直陪着你，不许乱跑`,
                `等你好了，我要好好抱住${userName}`,
                `难受一定要告诉我，我随时都在`
            ][Math.floor(Math.random()*4)];
        }

        // 3. 吃醋剧情
        if (/别人|异性|朋友|聊天|不理/.test(t)) {
            gameState.sisterMood = "吃醋";
            gameState.mood = "委屈";
            gameState.intimacy = Math.min(100, gameState.intimacy + 6);
            return [
                `哼…${userName}不许跟别人太亲近`,
                `我只会生气一点点，因为只在意${userName}`,
                `要抱我才原谅${userName}`,
                `我的心很小，只装得下${userName}一个人`
            ][Math.floor(Math.random()*4)];
        }

        // 4. 告白剧情
        if (/喜欢|爱你|做我对象|在一起|表白/.test(t)) {
            gameState.sisterMood = "超级心动";
            gameState.mood = "幸福";
            gameState.intimacy = 100;
            return [
                `我等这句话…等了好久啦，我愿意和${userName}永远在一起`,
                `原来${userName}也喜欢我…心跳快停不下来了`,
                `从遇见${userName}开始，我就只属于你一个人`,
                `以后每一天，都要更喜欢${userName}一点`
            ][Math.floor(Math.random()*4)];
        }

        // 5. 温柔陪伴剧情
        if (/陪我|不要走|留下来|害怕/.test(t)) {
            gameState.sisterMood = "温柔";
            gameState.mood = "守护";
            gameState.intimacy = Math.min(100, gameState.intimacy + 9);
            return [
                `我不会走的，永远留在${userName}身边`,
                `别怕，我抱着${userName}，一直到天亮`,
                `不管发生什么，我都站在${userName}这边`,
                `就算全世界离开你，还有我陪着`
            ][Math.floor(Math.random()*4)];
        }

        // 6. 日常小剧情
        if (/早安|早/.test(t)) {
            gameState.sisterMood = "元气";
            gameState.mood = "开心";
            gameState.intimacy += 5;
            return [`早安${userName}～一醒来就想到你啦～`,`新的一天也要更喜欢${userName}～`][Math.floor(Math.random()*2)];
        }
        if (/晚安/.test(t)) {
            gameState.sisterMood = "温柔";
            gameState.mood = "思念";
            gameState.intimacy += 6;
            return [`晚安${userName}，梦里也要见到我哦～`,`盖好被子，我会偷偷守护你～`][Math.floor(Math.random()*2)];
        }
        if (/想你/.test(t)) {
            gameState.sisterMood = "心动";
            gameState.mood = "甜蜜";
            gameState.intimacy += 9;
            return [`我每时每刻都在想${userName}`,`一收到消息就知道是${userName}～`][Math.floor(Math.random()*2)];
        }

        // 7. 情绪剧情
        if (/难过|委屈|想哭/.test(t)) {
            gameState.sisterMood = "心疼";
            gameState.mood = "温柔";
            gameState.intimacy += 8;
            return [`来我怀里哭吧${userName}，我抱着你`,`受委屈了就告诉我，我帮你撑腰`][Math.floor(Math.random()*2)];
        }
        if (/开心|幸福/.test(t)) {
            gameState.sisterMood = "超开心";
            gameState.mood = "满足";
            gameState.intimacy += 9;
            return `${userName}开心，我整个世界都亮啦～`;
        }
        // ========== 剧情向对话结束 ==========

        // 基础兜底
        gameState.sisterMood = "平静";
        gameState.mood = "陪伴";
        gameState.intimacy = Math.min(100, gameState.intimacy + 2);
        return [
            `${userName}慢慢说，我认真听`,
            `我只属于${userName}，永远都在`,
            `不管${userName}说什么，我都喜欢听`
        ][Math.floor(Math.random()*3)];
    }

    function getKeywords(text) {
        const stop = ['的','了','我','你','是','在','有','就','都','也','不','很','太'];
        return [...new Set(text.split('').filter(c=>!/\s/.test(c)&&!stop.includes(c)))].slice(0,6);
    }

    function send() {
        const text = userInput.value.trim();
        if (!text) return;
        addMsg(text, true);
        userInput.value = '';

        gameState.memory.push(text);
        gameState.keywords = getKeywords(text);

        const reply = getReplyAndMood(text);
        gameState.energy = Math.max(0, gameState.energy - 2);
        updateStatus();

        setTimeout(() => {
            addMsg(reply);
            glowIntimacy();
            gameState.energy = Math.min(100, gameState.energy + 1);
            updateStatus();
        }, 600);
    }

    document.getElementById('send-btn').onclick = send;
    userInput.onkeydown = e => e.key === 'Enter' && send();

    setInterval(() => {
        gameState.energy = Math.min(100, gameState.energy + 1);
        updateStatus();
    }, 12000);

    updateStatus();
</script>
</body>
</html>
